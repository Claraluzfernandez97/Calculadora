name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Android Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool libtool-bin m4 \
            pkg-config \
            zlib1g-dev libncurses5-dev libgdbm-dev \
            libssl-dev libffi-dev libsqlite3-dev \
            tk-dev libgdbm-compat-dev \
            libreadline-dev liblzma-dev \
            cmake ninja-build
          
          sudo libtoolize --force --copy --install || true
          sudo aclocal || true

      - name: Setup Android SDK Tools (Solución al error de sdkmanager)
        uses: android-actions/setup-android@v3

      - name: Initialize Autotools
        run: |
          sudo autoreconf --install --force || true
          sudo libtoolize --force --copy --install || true

      - name: Install Buildozer and Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --upgrade buildozer cython virtualenv pycparser
          pip install --upgrade python-for-android

      - name: Create Buildozer Config Cache Directory
        run: mkdir -p ~/.buildozer

      - name: Build APK
        run: |
          export PATH="/usr/local/opt/libtool/libexec:$PATH"
          yes | buildozer android debug
        env:
          BUILDOZER_BOOTSTRAP: sdl2
