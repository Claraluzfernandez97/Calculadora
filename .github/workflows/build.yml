name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool m4 \
            pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libssl-dev \
            libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev \
            cmake ninja-build libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install Buildozer and Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython virtualenv pycparser

      - name: Build APK with Buildozer
        run: |
          set -o pipefail
          # El parámetro --yes acepta automáticamente los términos del SDK en la nube
          buildozer -v android debug --yes 2>&1 | tee build.log

      - name: Upload APK & Logs Artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculadora-compilada
          path: |
            bin/*.apk
            build.log
