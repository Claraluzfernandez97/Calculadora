name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Android Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool m4 \
            pkg-config \
            zlib1g-dev libncurses5-dev libgdbm-dev \
            libssl-dev libffi-dev libsqlite3-dev \
            tk-dev libgdbm-compat-dev \
            libreadline-dev liblzma-dev \
            cmake ninja-build
          
          sudo libtoolize --force --copy --quiet || true 

      - name: Set Java Version
        run: |
          sudo update-alternatives --install /usr/bin/java java /usr/lib/jvm/java-17-openjdk-amd64/bin/java 1
          sudo update-alternatives --install /usr/bin/javac javac /usr/lib/jvm/java-17-openjdk-amd64/bin/javac 1
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      # 1. Usamos la acción oficial para instalar las herramientas necesarias en el entorno de GitHub
      - name: Setup Android SDK Tools
        uses: android-actions/setup-android@v3

      # 2. Instalamos build-tools globalmente usando el sdkmanager correcto de la acción anterior
      - name: Install Android SDK components
        run: |
          yes | sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install Buildozer and Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython virtualenv pycparser

      # 3. Compilar el APK diciéndole a Buildozer que use el SDK global de GitHub Actions
      - name: Build APK with Buildozer
        run: |
          # Pasamos las rutas del SDK oficial de GitHub Actions a Buildozer
          export ANDROID_HOME=$ANDROID_HOME
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          
          # Forzamos la aceptación de licencias por si acaso
          yes | buildozer android debug

      - name: Find and Move APK
        if: success()
        run: |
          mkdir -p output_apk
          find . -name "*.apk" -exec cp {} output_apk/ \;
          echo "Archivos encontrados:"
          ls -R output_apk/

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk-calculadora
          path: output_apk/*.apk

      - name: Upload Build Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ~/.buildozer/android/platform/build-*.log
            .buildozer/android/platform/build-*.log
