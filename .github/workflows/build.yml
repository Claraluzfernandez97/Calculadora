- name: Install Android Build Dependencies
  run: |
    sudo apt update
    sudo apt install -y \
      git zip unzip \
      autoconf automake libtool m4 \
      pkg-config \
      zlib1g-dev libncurses5-dev libgdbm-dev \
      libssl-dev libffi-dev libsqlite3-dev \
      tk-dev libgdbm-compat-dev \
      libreadline-dev liblzma-dev \
      cmake ninja-build
    
    # Generate libtool macros in the correct order
    sudo libtoolize --force --copy --install || true
    sudo aclocal -I /usr/share/aclocal || true
    sudo autoheader || true
    sudo automake --force-missing --add-missing || true
    sudo autoconf || true

- name: Build APK
  run: |
    export JAVA_HOME=$JAVA_HOME_11_X64
    export PATH=$JAVA_HOME/bin:$PATH
    export ACLOCAL_PATH="/usr/share/aclocal:/usr/local/share/aclocal:$ACLOCAL_PATH"
    export M4PATH="/usr/share/aclocal:/usr/local/share/aclocal"
    yes | buildozer android debug
  continue-on-error: false
