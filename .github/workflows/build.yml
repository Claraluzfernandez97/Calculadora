- name: Install Android SDK and build-tools
  run: |
    set -euxo pipefail
    export ANDROID_SDK_ROOT="$HOME/Android/Sdk"
    mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools" "$ANDROID_SDK_ROOT/platforms" "$ANDROID_SDK_ROOT/build-tools" "$ANDROID_SDK_ROOT/platform-tools"

    # Download command-line tools
    curl -fsSL -o /tmp/commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
    unzip -q /tmp/commandlinetools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
    mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest" || true

    export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"

    # Accept licenses
    yes | sdkmanager --licenses > /dev/null 2>&1 || true
    
    sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

    # Link to Buildozer's expected path
    mkdir -p "$HOME/.buildozer/android/platform"
    rm -f "$HOME/.buildozer/android/platform/android-sdk" || true
    ln -s "$ANDROID_SDK_ROOT" "$HOME/.buildozer/android/platform/android-sdk"

- name: Build APK
  env:
    ANDROID_SDK_ROOT: ${{ env.HOME }}/Android/Sdk
    ANDROID_HOME: ${{ env.HOME }}/Android/Sdk
    PATH: ${{ env.HOME }}/Android/Sdk/cmdline-tools/latest/bin:${{ env.PATH }}
  shell: bash
  run: |
    set -o pipefail
    buildozer -v android debug 2>&1 | tee build.log

