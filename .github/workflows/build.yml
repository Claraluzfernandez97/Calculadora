name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Android Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool m4 \
            pkg-config \
            zlib1g-dev libncurses5-dev libgdbm-dev \
            libssl-dev libffi-dev libsqlite3-dev \
            tk-dev libgdbm-compat-dev \
            libreadline-dev liblzma-dev \
            cmake ninja-build
          
          sudo libtoolize --force --copy --quiet || true 

      - name: Set Java Version
        run: |
          sudo update-alternatives --install /usr/bin/java java /usr/lib/jvm/java-17-openjdk-amd64/bin/java 1
          sudo update-alternatives --install /usr/bin/javac javac /usr/lib/jvm/java-17-openjdk-amd64/bin/javac 1
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Setup Android SDK Tools
        uses: android-actions/setup-android@v3

      - name: Configure SDK root for Buildozer
        run: |
          ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          ANDROID_HOME="$ANDROID_SDK_ROOT"
          mkdir -p "$ANDROID_SDK_ROOT"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          # Ensure cmdline-tools path is available for subsequent steps
          echo "PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH" >> $GITHUB_ENV

      - name: Install Android SDK components into Buildozer SDK root
        run: |
          ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          # Install cmdline-tools and required components into the Buildozer SDK root
          yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --install "cmdline-tools;latest" "platform-tools" "platforms;android-34" "build-tools;34.0.0" || true

      - name: Accept Android SDK Licenses
        run: |
          ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses || true

      - name: Verify and Install AIDL
        run: |
          ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          if [ -x "$ANDROID_SDK_ROOT/build-tools/34.0.0/aidl" ]; then
            echo "aidl found: $ANDROID_SDK_ROOT/build-tools/34.0.0/aidl"
          else
            echo "aidl NOT found, listing SDK contents:"
            ls -la "$ANDROID_SDK_ROOT" || true
            ls -la "$ANDROID_SDK_ROOT/build-tools" || true
            exit 1
          fi

      - name: Install Buildozer and Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython virtualenv pycparser

      - name: Create Buildozer Config Cache Directory
        run: mkdir -p ~/.buildozer

      - name: Debug SDK layout
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la "$HOME/.buildozer" || true
          ls -la "$HOME/.buildozer/android" || true
          ls -la "$HOME/.buildozer/android/platform" || true
          ls -la "$HOME/.buildozer/android/platform/android-sdk" || true
          ls -la "$HOME/.buildozer/android/platform/android-sdk/build-tools" || true

      - name: Build APK
        run: |
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          buildozer android debug

      - name: Find and Move APK
        if: success()
        run: |
          mkdir -p output_apk
          find . -name "*.apk" -exec cp {} output_apk/ \;
          echo "Archivos encontrados:"
          ls -R output_apk/

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk-calculadora
          path: output_apk/*.apk

      - name: Upload Build Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ~/.buildozer/android/platform/build-*.log

